<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connor • Personal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .vikings-purple { color: #4F2C7F; }
        .vikings-gold { color: #F4C430; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="sticky top-0 z-50 border-b border-purple-900 bg-zinc-950/95 backdrop-blur">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-700 to-yellow-400 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">C</div>
                <span class="text-2xl font-bold tracking-tight">Connor</span>
            </div>
            <div class="flex items-center gap-8 text-sm">
                <a href="#portfolio" class="hover:text-yellow-400">Portfolio</a>
                <a href="#vehicles" class="hover:text-yellow-400">Vehicles</a>
                <a href="#goals" class="hover:text-yellow-400">Goals</a>
                <a href="#rules" class="hover:text-yellow-400">Rules</a>
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full border border-purple-700 hover:bg-purple-900">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Rest of your content with more data... -->

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }
    </script>
</body>
</html>
